llm:
  providers:
  # 其他提供商示例
  # anthropic:
  #   type: anthropic
  #   base_url: https://api.anthropic.com
  #   api_key: your-api-key-here

logger:
  path: logs
  level: INFO
  rotation: 100 MB
  retention: 14 days
  compression: zip
  console: true

ws:
  host: 0.0.0.0
  port: 8081
  heartbeat_interval: 30
  heartbeat_timeout: 10

onebot:
  base_url: http://localhost:3000
  access_token: "" # 如果需要鉴权，填写访问令牌

content:
  max_content_num: 100 # 最大内容数量
  extract_threshold: 20 # 触发总结的阈值（内容数量）
  extract_batch_size: 20 # 每次总结的批次大小
